<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Colorlib Templates">
    <meta name="author" content="Colorlib">
    <meta name="keywords" content="Colorlib Templates">

    <!-- Title Page-->
    <title>Apply for job by Colorlib</title>

    <!-- Font special for pages-->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i,800,800i" rel="stylesheet">

    <!-- Main CSS-->
    <link href="static/css/styleForNewAdd.css" rel="stylesheet" />
</head>

<body>
    <div class="page-wrapper bg-dark p-t-100 p-b-50">
        <div class="wrapper wrapper--w900">
            <div class="card card-6">
                <div class="card-heading">
                    <!-- <h2 class="title">Добавить объявление</h2> -->
                </div>
                <div class="card-body">
                    <form method="POST" enctype=multipart/form-data> 
                        <div class="form-row">
                            <div class="name">Название</div>
                            <div class="value">
                                <input class="input--style-6" type="text" name="name">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="name">Цена</div>
                            <div class="value">
                                <div class="input-group">
                                    <input class="input--style-6" type="number" name="price" placeholder="KZT">
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="name">Описание</div>
                            <div class="value">
                                <div class="input-group">
                                    <textarea class="textarea--style-6" name="discription" placeholder="Дополнительная информация"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="name">Добавить файл</div>
                            <div class="value">
                                <div class="input-group js-input-file">
                                    <input class="form-control" type="file" name="file_img" id="file">
                                    <!-- <label class="label--file" for="file">Choose file</label>
                                    <span class="input-file__info">No file chosen</span> -->
                                </div>
                                <div class="label--desc">Загрузите соответствующий файл. Максимальный размер файла 50 МБ.</div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn--radius-2 btn--blue-2" type="submit">Добавить</button>
                            <a href="/">на главную</a>
                        </div>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
